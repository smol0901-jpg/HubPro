<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HubPro - Вход</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; }
    .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
  </style>
</head>
<body class="flex items-center justify-center">
  <div class="glass rounded-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">HubPro</h1>
      <p class="text-gray-400 mt-2">Центр управления Telegram</p>
    </div>

    <div id="serverStatus" class="mb-4 p-3 rounded-lg bg-yellow-500/20 border border-yellow-500 text-yellow-300 text-sm text-center">
      ⏳ Проверка сервера...
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-gray-300 mb-2">Логин</label>
        <input type="text" id="login" name="login" required autocomplete="username"
          class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
          placeholder="Введите логин" value="admin">
      </div>

      <div>
        <label class="block text-gray-300 mb-2">Пароль</label>
        <input type="password" id="password" name="password" required autocomplete="current-password"
          class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
          placeholder="Введите пароль" value="901Admin">
      </div>

      <div id="errorMessage" class="hidden p-3 rounded-lg bg-red-500/20 border border-red-500 text-red-300 text-sm"></div>
      <div id="successMessage" class="hidden p-3 rounded-lg bg-green-500/20 border border-green-500 text-green-300 text-sm"></div>

      <button type="submit" id="submitBtn"
        class="w-full py-3 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold transition">
        Войти
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-gray-500 text-sm">Логин: admin | Пароль: 901Admin</p>
    </div>
  </div>

  <script>
    const statusDiv = document.getElementById('serverStatus');

    // Check server on load
    fetch('/api/check-server')
      .then(r => r.json())
      .then(d => {
        console.log('Server OK:', d);
        statusDiv.className = 'mb-4 p-3 rounded-lg bg-green-500/20 border border-green-500 text-green-300 text-sm text-center';
        statusDiv.textContent = '✅ Сервер работает на порту ' + (d.port || '3000');
      })
      .catch(e => {
        console.error('Server error:', e);
        statusDiv.className = 'mb-4 p-3 rounded-lg bg-red-500/20 border border-red-500 text-red-300 text-sm text-center';
        statusDiv.innerHTML = '❌ Сервер не отвечает<br><a href="http://localhost:3001" class="underline">Попробуйте порт 3001</a>';
      });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      e.stopPropagation();

      const login = document.getElementById('login').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');

      console.log('Form submitted, login:', login, 'password:', password);

      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Проверка...';

      try {
        console.log('Sending request to /api/login');
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, password })
        });

        console.log('Response status:', response.status);
        const data = await response.json();
        console.log('Response data:', data);

        if (data.success) {
          successDiv.textContent = '✅ Успешно! Перенаправление...';
          successDiv.classList.remove('hidden');
          setTimeout(() => window.location.href = '/index.html', 1000);
        } else {
          errorDiv.textContent = '❌ ' + (data.error || 'Ошибка входа');
          errorDiv.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Войти';
        }
      } catch (error) {
        console.error('Fetch error:', error);
        errorDiv.innerHTML = '❌ Ошибка соединения с сервером';
        errorDiv.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Войти';
      }

      return false;
    });
  </script>
</body>
</html>
