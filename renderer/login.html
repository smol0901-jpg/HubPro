<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HubPro - Вход</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; }
    .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
  </style>
</head>
<body class="flex items-center justify-center">
  <div class="glass rounded-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">HubPro</h1>
      <p class="text-gray-400 mt-2">Центр управления Telegram</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-gray-300 mb-2">Логин</label>
        <input type="text" id="login" name="login" required
          class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
          placeholder="Введите логин">
      </div>

      <div>
        <label class="block text-gray-300 mb-2">Пароль</label>
        <input type="password" id="password" name="password" required
          class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
          placeholder="Введите пароль">
      </div>

      <div id="errorMessage" class="hidden p-3 rounded-lg bg-red-500/20 border border-red-500 text-red-300 text-sm"></div>
      <div id="successMessage" class="hidden p-3 rounded-lg bg-green-500/20 border border-green-500 text-green-300 text-sm"></div>

      <button type="submit" id="submitBtn"
        class="w-full py-3 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold transition">
        Войти
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-gray-500 text-sm">Логин: admin | Пароль: 901Admin</p>
    </div>
  </div>

  <script>
    const API = '';

    // Check server first
    fetch(API + '/api/check-server')
      .then(r => r.json())
      .then(d => console.log('Server OK:', d))
      .catch(e => console.error('Server error:', e));

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const login = document.getElementById('login').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');

      // Hide previous messages
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      // Show loading
      submitBtn.disabled = true;
      submitBtn.textContent = 'Проверка...';

      try {
        const response = await fetch(API + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, password })
        });

        const data = await response.json();

        if (data.success) {
          successDiv.textContent = '✅ Успешно! Перенаправление...';
          successDiv.classList.remove('hidden');

          // Save auth
          localStorage.setItem('hubpro_user', JSON.stringify(data.user));

          // Redirect after short delay
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);
        } else {
          errorDiv.textContent = '❌ ' + (data.error || 'Ошибка входа');
          errorDiv.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Войти';
        }
      } catch (error) {
        errorDiv.textContent = '❌ Ошибка соединения с сервером. Убедитесь, что сервер запущен.';
        errorDiv.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Войти';
      }
    });
  </script>
</body>
</html>
